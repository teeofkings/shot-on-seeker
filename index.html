<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seeker Camera</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Detection Warning -->
    <div id="not-seeker" class="overlay-screen hidden">
      <div class="message-box">
        <h1>Solana Seeker Only</h1>
        <p>This exclusive camera experience is designed for the Solana Seeker device.</p>
        <button id="simulate-seeker" class="secondary-btn">Simulate Seeker (Dev)</button>
      </div>
    </div>

    <!-- Camera Interface -->
    <div id="camera-page" class="hidden">
      <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" class="hidden"></canvas>
        <div id="flash" class="flash-overlay"></div>
      </div>

      <div class="controls-overlay">
        <div class="top-controls">
          <!-- Placeholder for settings or flash toggle -->
        </div>
        
        <div class="bottom-controls">
           <div class="gallery-preview" id="gallery-preview">
             <!-- Last taken photo thumbnail -->
           </div>

           <button id="capture-btn" class="shutter-btn">
             <div class="shutter-inner"></div>
           </button>

           <button id="flip-camera" class="icon-btn">
             <span class="material-icons">flip_camera_ios</span>
           </button>
        </div>
      </div>
    </div>

    <!-- Preview/Result Screen -->
    <div id="result-page" class="overlay-screen hidden">
      <div class="result-container">
        <img id="captured-image" src="" alt="Captured">
        <div class="result-actions">
          <button id="retake-btn" class="icon-btn"><span class="material-icons">close</span></button>
          <button id="save-btn" class="icon-btn primary"><span class="material-icons">download</span></button>
          <button id="share-btn" class="icon-btn"><span class="material-icons">share</span></button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
